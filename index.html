<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Glass Weather App</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e3a8a,#38bdf8);
  overflow:hidden;
}

.blur{
  position:absolute;
  width:300px;
  height:300px;
  border-radius:50%;
  background:#ffffff20;
  filter:blur(80px);
}

.blur:nth-child(1){
  top:-50px;
  left:-50px;
}

.blur:nth-child(2){
  bottom:-50px;
  right:-50px;
}

.card{
  position:relative;
  width:350px;
  padding:30px;
  border-radius:25px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.2);
  color:white;
  text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,0.2);
}

h1{
  margin-bottom:20px;
  font-size:32px;
}

.search{
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  outline:none;
  font-size:16px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:#ffffff;
  color:#1e3a8a;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

.weather{
  margin-top:25px;
}

.temp{
  font-size:60px;
  font-weight:bold;
}

.city{
  font-size:28px;
  margin-top:10px;
}

.desc{
  margin-top:8px;
  opacity:0.8;
  text-transform:capitalize;
}
</style>
</head>

<body>

<div class="blur"></div>
<div class="blur"></div>

<div class="card">
  <h1>☁ Weather</h1>

  <div class="search">
    <input type="text" id="cityInput" placeholder="Enter city">
    <button onclick="getWeather()">Go</button>
  </div>

  <div class="weather" id="weatherBox"></div>
</div>

<script>
async function getWeather() {
  const city = document.getElementById("cityInput").value;

  const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`;
  const geoRes = await fetch(geoUrl);
  const geoData = await geoRes.json();

  if (!geoData.results) {
    document.getElementById("weatherBox").innerHTML = "City not found";
    return;
  }

  const place = geoData.results[0];
  const lat = place.latitude;
  const lon = place.longitude;

  const weatherUrl =
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&daily=temperature_2m_max,temperature_2m_min,precipitation_sum` +
    `&past_days=7&forecast_days=7&timezone=auto`;

  const res = await fetch(weatherUrl);
  const data = await res.json();

  let html = `<div class="city">${place.name}</div>`;

  html += `<h3>Past 7 Days + Next 7 Days</h3>`;

  data.daily.time.forEach((date, i) => {
    html += `
      <div style="margin:12px 0;padding:12px;border-radius:15px;background:rgba(255,255,255,0.15)">
        <b>${date}</b><br>
        🌡 ${data.daily.temperature_2m_min[i]}°C - ${data.daily.temperature_2m_max[i]}°C<br>
        🌧 Rain: ${data.daily.precipitation_sum[i]} mm
      </div>
    `;
  });

  document.getElementById("weatherBox").innerHTML = html;
}
</script>

</body>
</html>
