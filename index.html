<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Tracker</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #111827, #2563eb, #38bdf8);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

.app {
  width: 420px;
  padding: 30px;
  border-radius: 30px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  box-shadow: 0 25px 60px rgba(0,0,0,0.35);
}

h1 {
  text-align: center;
  font-size: 38px;
  margin-bottom: 25px;
}

.search {
  display: flex;
  gap: 12px;
}

input {
  flex: 1;
  padding: 16px;
  border: none;
  border-radius: 18px;
  outline: none;
  font-size: 16px;
}

button {
  padding: 0 22px;
  border: none;
  border-radius: 18px;
  background: #111827;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #000;
}

.weather {
  margin-top: 25px;
}

.main-card {
  text-align: center;
  padding: 25px;
  border-radius: 25px;
  background: rgba(255,255,255,0.16);
}

.temp {
  font-size: 64px;
  font-weight: bold;
}

.city {
  font-size: 26px;
  margin-top: 8px;
}

.desc {
  text-transform: capitalize;
  opacity: 0.85;
}

.days {
  margin-top: 20px;
  display: grid;
  gap: 12px;
  max-height: 300px;
  overflow-y: auto;
}

.day {
  padding: 14px;
  border-radius: 18px;
  background: rgba(255,255,255,0.14);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.error {
  margin-top: 20px;
  text-align: center;
  color: #fecaca;
}
</style>
</head>

<body>

<div class="app">
  <h1>☁ Weather</h1>

  <div class="search">
    <input id="cityInput" type="text" placeholder="Search city..." autocomplete="off">
    <button onclick="getWeather()">Go</button>
  </div>

  <div id="weatherBox" class="weather"></div>
</div>

<script>
async function getWeather() {
  const city = document.getElementById("cityInput").value.trim();
  const box = document.getElementById("weatherBox");

  if (!city) {
    box.innerHTML = `<div class="error">Please enter a city name</div>`;
    return;
  }

  box.innerHTML = `<div class="error">Loading...</div>`;

  const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`;
  const geoRes = await fetch(geoUrl);
  const geoData = await geoRes.json();

  if (!geoData.results) {
    box.innerHTML = `<div class="error">City not found</div>`;
    return;
  }

  const place = geoData.results[0];

  const weatherUrl =
    `https://api.open-meteo.com/v1/forecast?latitude=${place.latitude}&longitude=${place.longitude}` +
    `&current=temperature_2m,weather_code` +
    `&daily=temperature_2m_max,temperature_2m_min,precipitation_sum` +
    `&past_days=7&forecast_days=7&timezone=auto`;

  const res = await fetch(weatherUrl);
  const data = await res.json();

  let html = `
    <div class="main-card">
      <div class="temp">${Math.round(data.current.temperature_2m)}°C</div>
      <div class="city">${place.name}</div>
      <div class="desc">${place.country}</div>
    </div>

    <div class="days">
  `;

  data.daily.time.forEach((date, i) => {
    html += `
      <div class="day">
        <div>
          <strong>${date}</strong><br>
          Rain: ${data.daily.precipitation_sum[i]} mm
        </div>
        <div>
          ${Math.round(data.daily.temperature_2m_min[i])}° /
          ${Math.round(data.daily.temperature_2m_max[i])}°
        </div>
      </div>
    `;
  });

  html += `</div>`;
  box.innerHTML = html;
}
</script>

</body>
</html>
